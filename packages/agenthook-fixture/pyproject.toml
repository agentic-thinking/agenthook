[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agenthook-agenthook-fixture-test"
version = "0.1.0"
description = "Minimal AgentHook conformance fixture for compatible collectors."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Agentic Thinking"}]

[project.scripts]
agenthook-fixture = "agenthook_fixture.cli:main"

[tool.setuptools.packages.find]
include = ["agenthook_fixture*"]
