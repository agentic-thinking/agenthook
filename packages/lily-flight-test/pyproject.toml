[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agenthook-lily-flight-test"
version = "0.1.0"
description = "Minimal AgentHook conformance flight-test fixture for compatible collectors."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Agentic Thinking"}]

[project.scripts]
lily-flight = "lily_flight.cli:main"

[tool.setuptools.packages.find]
include = ["lily_flight*"]
